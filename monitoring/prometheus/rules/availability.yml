---
# Scrape-target and ingress alerts (architecture/006 coverage matrix,
# Traefik row; black-box endpoint checks live in Uptime Kuma).
groups:
  - name: availability
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target {{ $labels.job }} is down"
          description: >
            {{ $labels.instance }} has failed scraping for 5 minutes.

      - alert: TraefikHigh5xxRate
        expr: >
          sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Traefik is serving 5xx responses"
          description: >
            More than 1 error/s for 10 minutes — a backend is unhealthy
            behind a healthy proxy.
