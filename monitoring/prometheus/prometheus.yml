---
# Scrape topology per architecture/006: 30s interval, 15d retention
# (retention is a prometheus command flag in compose.yaml).
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  # Traefik's metrics entrypoint (:8082, unpublished) is reachable
  # because both containers sit on net_monitoring.
  - job_name: traefik
    static_configs:
      - targets: [traefik:8082]
